# Staging overrides:
# - No Traefik, no TLS termination via Let's Encrypt
# - nginx terminates HTTPS (443) and proxies to Keycloak (8080) and API (8000)
# - Keycloak runs internally on HTTP
# - Monitoring stack active

services:
  api:
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    labels:
      logging: "promtail"
      logging_jobname: "api"

  celery-worker:
    labels:
      logging: "promtail"
      logging_jobname: "celery-worker"

  celery-beat:
    labels:
      logging: "promtail"
      logging_jobname: "celery-beat"

  keycloak:
    command: start --import-realm

  frontend:
    volumes:
      - ./nginx/frontend.http.conf:/etc/nginx/conf.d/default.conf:ro

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

  prometheus:
    image: prom/prometheus:v2.48.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - appstore-network

  loki:
    image: grafana/loki:2.9.3
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki
    networks:
      - appstore-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.3
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - appstore-network

  grafana:
    image: grafana/grafana:10.2.3
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://${SERVER_IP}:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - appstore-network

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/postgres
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/redis
  prometheus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/prometheus
  loki-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/loki
  grafana-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/grafana
