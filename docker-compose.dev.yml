# Dev-Overrides:
# - Backend/Frontend werden lokal gebaut (kein ghcr.io Image nötig)
# - Source-Code wird als Volume gemountet → Hot-Reload
# - Keycloak läuft im dev-Modus (kein HTTPS nötig)
# - Alle Ports sind direkt erreichbar

services:
  api:
    image: ""
    build: ../appstore-backend
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ../appstore-backend/src:/app/src
      - ../appstore-backend/logs:/app/logs

  celery-worker:
    image: ""
    build: ../appstore-backend
    volumes:
      - ../appstore-backend/src:/app/src

  frontend:
    image: ""
    build:
      context: ../appstore-frontend
      args:
        VITE_KEYCLOAK_URL: ${KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID_FRONTEND:-appstore-frontend}
    ports:
      - "3000:80"

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  keycloak:
    command: start-dev --import-realm
    ports:
      - "8080:8080"
