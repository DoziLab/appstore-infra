services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - appstore-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - appstore-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${BACKEND_IMAGE:-ghcr.io/your-org/appstore-backend:latest}
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID_BACKEND:-appstore-backend}
      - KEYCLOAK_JWKS_CACHE_TTL=${KEYCLOAK_JWKS_CACHE_TTL:-3600}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ANSIBLE_SSH_KEY_PATH=/run/secrets/dozilab_ansible
      - ANSIBLE_SSH_KEY_NAME=${ANSIBLE_SSH_KEY_NAME:-dozilab-ansible-key}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appstore-network
    volumes:
      - ./logs:/app/logs
      - ${ANSIBLE_SSH_KEY_PATH}:/run/secrets/dozilab_ansible:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery-worker:
    image: ${BACKEND_IMAGE:-ghcr.io/your-org/appstore-backend:latest}
    restart: unless-stopped
    command: celery -A src.celery_app:celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID_BACKEND:-appstore-backend}
      - KEYCLOAK_JWKS_CACHE_TTL=${KEYCLOAK_JWKS_CACHE_TTL:-3600}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ANSIBLE_SSH_KEY_PATH=/run/secrets/dozilab_ansible
      - ANSIBLE_SSH_KEY_NAME=${ANSIBLE_SSH_KEY_NAME:-dozilab-ansible-key}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appstore-network
    volumes:
      - ./logs:/app/logs
      - ${ANSIBLE_SSH_KEY_PATH}:/run/secrets/dozilab_ansible:ro

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/your-org/appstore-frontend:latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - appstore-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN_USER}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://db:5432/${DB_NAME}
      - KC_DB_USERNAME=${DB_USER}
      - KC_DB_PASSWORD=${DB_PASSWORD}
      - KC_HOSTNAME=${KEYCLOAK_URL}
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY_HEADERS=forwarded
      - KC_HTTP_ENABLED=true
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appstore-network
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      keycloak:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - appstore-network
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro

networks:
  appstore-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
