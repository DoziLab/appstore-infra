# Production-Overrides:
# - Identisch zu Staging
# - Kein Traefik, kein Let's Encrypt
# - Ports direkt exposed
# - Keycloak auf Port 8443 mit self-signed Zertifikat

services:
  api:
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    labels:
      logging: "promtail"
      logging_jobname: "api"

  celery-worker:
    labels:
      logging: "promtail"
      logging_jobname: "celery-worker"

  frontend:
    ports:
      - "80:80"
      - "443:443"

  keycloak:
    command: >
      start
      --import-realm
      --proxy=edge
      --hostname=${KEYCLOAK_URL}
      --hostname-strict=false
      --https-key-store-file=/opt/keycloak/conf/keycloak.p12
      --https-key-store-password=keycloak
      --https-port=8443
    ports:
      - "8443:8443"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
      - keycloak-certs:/opt/keycloak/conf
    depends_on:
      db:
        condition: service_healthy

  keycloak-cert-init:
    image: openjdk:17-slim
    entrypoint: >
      bash -c "
        if [ ! -f /certs/keycloak.p12 ]; then
          keytool -genkeypair -alias keycloak -keyalg RSA -keysize 2048
            -validity 3650 -keystore /certs/keycloak.p12 -storetype PKCS12
            -storepass keycloak -keypass keycloak
            -dname 'CN=${SERVER_IP},OU=AppStore,O=DHBW,L=Mannheim,ST=BW,C=DE';
          echo 'Certificate generated';
        else
          echo 'Certificate already exists';
        fi
      "
    volumes:
      - keycloak-certs:/certs
    networks:
      - appstore-network

  prometheus:
    image: prom/prometheus:v2.48.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - appstore-network

  loki:
    image: grafana/loki:2.9.3
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki
    networks:
      - appstore-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.3
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - appstore-network

  grafana:
    image: grafana/grafana:10.2.3
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://${SERVER_IP}:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - appstore-network

volumes:
  keycloak-certs:
  prometheus-data:
  loki-data:
  grafana-data:
