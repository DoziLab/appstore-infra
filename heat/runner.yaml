heat_template_version: 2018-08-31

description: AppStore GitHub Actions Self-hosted Runner

parameters:
  stack_label:
    type: string
    default: "dozilab-github-runner"
    constraints:
      - allowed_pattern: '^[a-z0-9][a-z0-9-]{0,30}$'
    description: "Short label for VM name."

  image:
    type: string
    default: "Ubuntu 22.04 2025-01"
    constraints:
      - allowed_values:
          - "Ubuntu 22.04 2025-01"
          - "Ubuntu 24.04 2025-01"
          - "Ubuntu 24.04 2026-01"

  flavor:
    type: string
    default: "gp1.small"
    constraints:
      - allowed_values:
          - "gp1.small"
          - "gp1.medium"
    description: "gp1.small reicht für den Runner."

  network:
    type: string
    default: "NAT"
    constraints:
      - allowed_values: ["NAT"]

  external_network:
    type: string
    default: "DHBW"
    constraints:
      - allowed_values: ["DHBW"]

  ssh_cidr:
    type: string
    default: "141.72.0.0/16"
    constraints:
      - allowed_pattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    description: "CIDR allowed for SSH access."

  public_key:
    type: string
    description: "Inhalt des lokalen Public Keys (~/.ssh/dozilab-github-runner.pub)."

  github_org:
    type: string
    description: "GitHub Organisation oder User, z.B. dozilab"

  github_runner_token:
    type: string
    hidden: true
    description: "Runner Registration Token aus GitHub (Settings → Actions → Runners → New runner)."

  runner_labels:
    type: string
    default: "self-hosted,linux"
    description: "Kommagetrennte Labels für den Runner, z.B. self-hosted,linux"

resources:
  keypair:
    type: OS::Nova::KeyPair
    properties:
      name: "dozilab-github-runner-key"
      public_key: { get_param: public_key }

  secgroup:
    type: OS::Neutron::SecurityGroup
    properties:
      description: AppStore Runner security group
      rules:
        - direction: ingress
          ethertype: IPv4
          protocol: tcp
          port_range_min: 22
          port_range_max: 22
          remote_ip_prefix: { get_param: ssh_cidr }
        - direction: ingress
          ethertype: IPv4
          protocol: icmp
          remote_ip_prefix: { get_param: ssh_cidr }
        - direction: egress
          ethertype: IPv4

  port:
    type: OS::Neutron::Port
    properties:
      network: { get_param: network }
      security_groups:
        - { get_resource: secgroup }

  server:
    type: OS::Nova::Server
    properties:
      name: "dozilab-github-runner"
      image: { get_param: image }
      flavor: { get_param: flavor }
      key_name: { get_resource: keypair }
      networks:
        - port: { get_resource: port }
      metadata:
        dozilab_stack_label: { get_param: stack_label }
        dozilab_ready_marker: "DOZILAB_READY"
      user_data_format: RAW
      user_data:
        str_replace:
          template: { get_file: cloud-init/runner.yaml }
          params:
            __STACK_LABEL__:         { get_param: stack_label }
            __GITHUB_ORG__:          { get_param: github_org }
            __GITHUB_RUNNER_TOKEN__: { get_param: github_runner_token }
            __RUNNER_LABELS__:       { get_param: runner_labels }

  fip:
    type: OS::Neutron::FloatingIP
    properties:
      floating_network: { get_param: external_network }

  fip_assoc:
    type: OS::Neutron::FloatingIPAssociation
    properties:
      floatingip_id: { get_resource: fip }
      port_id: { get_resource: port }

outputs:
  floating_ip:
    description: Public floating IP of the runner
    value: { get_attr: [fip, floating_ip_address] }

  ssh_hint:
    description: SSH command
    value:
      str_replace:
        template: "ssh -i ~/.ssh/dozilab-github-runner ubuntu@FIP"
        params:
          FIP: { get_attr: [fip, floating_ip_address] }

  ready_marker:
    description: Marker in Nova console log after cloud-init finished
    value:
      str_replace:
        template: "DOZILAB_READY stack=STACK"
        params:
          STACK: { get_param: stack_label }
