#cloud-config
package_update: true
package_upgrade: false

write_files:
  - path: /usr/local/bin/appstore-app-setup.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      STACK_LABEL="__STACK_LABEL__"
      ENVIRONMENT="__ENVIRONMENT__"
      GITHUB_ORG="__GITHUB_ORG__"
      INFRA_REPO="__INFRA_REPO__"
      DB_PASSWORD="__DB_PASSWORD__"
      KEYCLOAK_ADMIN_PASSWORD="__KEYCLOAK_ADMIN_PASSWORD__"
      ENCRYPTION_KEY="__ENCRYPTION_KEY__"
      GRAFANA_ADMIN_PASSWORD="__GRAFANA_ADMIN_PASSWORD__"
      LOG="/var/log/appstore-app-setup.log"
      MARK_DIR="/var/lib/dozilab"

      mkdir -p "$MARK_DIR"
      exec > >(tee -a "$LOG" /var/log/cloud-init-output.log) 2>&1

      on_fail() {
        rc=$?
        echo "DOZILAB_FAILED stack=${STACK_LABEL} rc=${rc} time=$(date -Is)" | tee /dev/console > "${MARK_DIR}/failed"
        exit "$rc"
      }
      trap on_fail ERR

      echo "App server setup started $(date -Is) [${ENVIRONMENT}]"

      # Install Docker
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -yq ca-certificates curl gnupg git jq openssl

      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
      apt-get update -q
      apt-get install -yq docker-ce docker-ce-cli containerd.io docker-compose-plugin
      usermod -aG docker ubuntu

      # Mount Cinder volume (/dev/vdb -> /data) before starting Docker
      if [ -b /dev/vdb ]; then
        if ! blkid /dev/vdb | grep -q ext4; then
          echo "Formatting Cinder volume /dev/vdb..."
          mkfs.ext4 /dev/vdb
        fi
        mkdir -p /data
        mount /dev/vdb /data
        UUID=$(blkid -s UUID -o value /dev/vdb)
        echo "UUID=${UUID} /data ext4 defaults,nofail 0 2" >> /etc/fstab
        echo "Cinder volume mounted at /data"
      else
        echo "No Cinder volume found at /dev/vdb, using root disk"
        mkdir -p /data
      fi

      # Configure Docker to use Cinder volume for data
      mkdir -p /data/docker
      mkdir -p /etc/docker
      echo '{"data-root": "/data/docker"}' > /etc/docker/daemon.json
      systemctl enable --now docker

      # Create Docker data directories on /data with correct permissions
      mkdir -p /data/postgres /data/redis /data/keycloak /data/prometheus
      mkdir -p /data/loki/wal /data/loki/index /data/loki/chunks /data/loki/compactor /data/loki/index_cache
      mkdir -p /data/grafana
      chown -R 999:999 /data/postgres
      chown -R 10001:10001 /data/loki
      chown -R 472:472 /data/grafana
      chown ubuntu:ubuntu /data/redis /data/prometheus /data/keycloak

      # Clone infra repo
      git clone "https://github.com/${GITHUB_ORG}/${INFRA_REPO}.git" /opt/appstore
      chown -R ubuntu:ubuntu /opt/appstore

      # Get floating IP from OpenStack metadata
      SERVER_IP=""
      SERVER_IP=$(curl -sf --max-time 5 http://169.254.169.254/latest/meta-data/public-ipv4 2>/dev/null) || true
      if [ -z "${SERVER_IP}" ]; then
        SERVER_IP=$(curl -sf --max-time 5 http://169.254.169.254/openstack/latest/meta_data.json 2>/dev/null \
          | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('public_ipv4',''))" 2>/dev/null) || true
      fi
      if [ -z "${SERVER_IP}" ]; then
        echo "WARNING: Could not determine public IP, using placeholder"
        SERVER_IP="UNKNOWN"
      fi
      echo "Server IP: ${SERVER_IP}"
      KEYCLOAK_URL="https://${SERVER_IP}:8443"

      # Set image tags and key name based on environment
      if [ "${ENVIRONMENT}" = "staging" ]; then
        BACKEND_IMAGE="ghcr.io/${GITHUB_ORG}/appstore-backend:staging"
        FRONTEND_IMAGE="ghcr.io/${GITHUB_ORG}/appstore-frontend:staging"
        ANSIBLE_SSH_KEY_NAME="dozilab-ansible-key-staging"
      else
        BACKEND_IMAGE="ghcr.io/${GITHUB_ORG}/appstore-backend:latest"
        FRONTEND_IMAGE="ghcr.io/${GITHUB_ORG}/appstore-frontend:latest"
        ANSIBLE_SSH_KEY_NAME="dozilab-ansible-key-prod"
      fi

      # Generate Ansible SSH key
      mkdir -p /home/ubuntu/.ssh
      rm -rf /home/ubuntu/.ssh/dozilab_ansible
      ssh-keygen -t ed25519 -f /home/ubuntu/.ssh/dozilab_ansible -N ""
      chmod 600 /home/ubuntu/.ssh/dozilab_ansible
      chmod 644 /home/ubuntu/.ssh/dozilab_ansible.pub
      chown ubuntu:ubuntu /home/ubuntu/.ssh/dozilab_ansible /home/ubuntu/.ssh/dozilab_ansible.pub

      # Write .env (using printf instead of heredoc to avoid YAML parsing issues)
      printf 'SERVER_IP=%s\n\nDB_USER=postgres\nDB_PASSWORD=%s\nDB_NAME=dozilab\nDB_PORT=5432\n\nENCRYPTION_KEY=%s\n\nKEYCLOAK_ADMIN_USER=admin\nKEYCLOAK_ADMIN_PASSWORD=%s\nKEYCLOAK_REALM=Dozilab\nKEYCLOAK_CLIENT_ID_BACKEND=appstore-backend\nKEYCLOAK_CLIENT_ID_FRONTEND=appstore-frontend\nKEYCLOAK_JWKS_CACHE_TTL=3600\nKEYCLOAK_URL=%s\n\nANSIBLE_SSH_KEY_PATH=/home/ubuntu/.ssh/dozilab_ansible\nANSIBLE_SSH_KEY_NAME=%s\n\nGRAFANA_ADMIN_USER=admin\nGRAFANA_ADMIN_PASSWORD=%s\n\nBACKEND_IMAGE=%s\nFRONTEND_IMAGE=%s\n' \
        "${SERVER_IP}" "${DB_PASSWORD}" "${ENCRYPTION_KEY}" "${KEYCLOAK_ADMIN_PASSWORD}" \
        "${KEYCLOAK_URL}" "${ANSIBLE_SSH_KEY_NAME}" "${GRAFANA_ADMIN_PASSWORD}" "${BACKEND_IMAGE}" "${FRONTEND_IMAGE}" \
        > /opt/appstore/.env

      chown ubuntu:ubuntu /opt/appstore/.env
      chmod 600 /opt/appstore/.env

      # Create logs directory
      mkdir -p /opt/appstore/logs
      chown ubuntu:ubuntu /opt/appstore/logs

      # Generate self-signed certificate for nginx
      mkdir -p /opt/appstore/nginx/certs
      openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
        -keyout /opt/appstore/nginx/certs/selfsigned.key \
        -out /opt/appstore/nginx/certs/selfsigned.crt \
        -subj "/CN=${SERVER_IP}"
      chown -R ubuntu:ubuntu /opt/appstore/nginx/certs

      printf 'AppStore App Server [%s]\nStack: %s\nIP:    %s\nInfra: /opt/appstore\n' \
        "${ENVIRONMENT}" "${STACK_LABEL}" "${SERVER_IP}" > /etc/motd

      echo "DOZILAB_READY stack=${STACK_LABEL} time=$(date -Is)" | tee /dev/console > "${MARK_DIR}/ready"
      echo "App server setup finished $(date -Is)"

runcmd:
  - [ bash, -lc, "/usr/local/bin/appstore-app-setup.sh" ]

final_message: "AppStore App Server: cloud-init finished"
